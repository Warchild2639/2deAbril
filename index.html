    <style>

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; background: #f4f4f4; color: #333; overflow-x: hidden; }

        header { 
            height: 90vh; display: flex; align-items: center; justify-content: center; color: white; text-align: center;
            background: linear-gradient(rgba(0, 51, 102, 0.5), rgba(0, 51, 102, 0.8)), url('img/header-bg.jpg'); 
            background-size: cover; background-position: 80% center; background-attachment: fixed;
            background-color: var(--azul-mar); border-bottom: 15px solid var(--amarillo);
        }
        .header-content h1 { font-size: clamp(3rem, 10vw, 8rem); margin: 0; font-weight: 900; text-transform: uppercase; text-shadow: 0 10px 30px rgba(0,0,0,0.6); animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        nav { background: #ffffff; padding: 10px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; border-bottom: 6px solid var(--celeste); position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.15); }
        nav a, .dropbtn { text-decoration: none; color: var(--azul-mar); font-weight: 900; text-transform: uppercase; font-size: 0.85rem; padding: 12px 18px; border-radius: 8px; transition: all 0.3s ease; cursor: pointer; border: none; background: none; font-family: inherit; }
        nav a:hover, .nav-item:hover .dropbtn { color: white; background-color: var(--azul-mar); }
        
        /* TRIVIA DESTACADA EN NAV */
        nav a[href="#trivia"] { background-color: var(--amarillo); color: var(--azul-mar); }

        .nav-item { position: relative; display: inline-block; }
        .dropdown-content { opacity: 0; visibility: hidden; position: absolute; background-color: #ffffff; min-width: 220px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); border-radius: 0 0 8px 8px; z-index: 1; top: 100%; left: 0; border-top: 3px solid var(--amarillo); transform: translateY(10px); transition: 0.4s; }
        .dropdown-content a { color: var(--azul-mar); padding: 12px 16px; text-decoration: none; display: block; text-align: left; font-size: 0.8rem; }
        .nav-item:hover .dropdown-content { opacity: 1; visibility: visible; transform: translateY(0); }

        section { padding: 100px 10%; max-width: 1400px; margin: 0 auto; }
        .subtitulo-moderno { display: block; width: 100%; background: var(--azul-mar); color: white; padding: 20px 50px; font-weight: 900; font-size: 1.8rem; margin-bottom: 60px; text-transform: uppercase; border-left: 15px solid var(--amarillo); clip-path: polygon(0 0, 98% 0, 100% 50%, 98% 100%, 0 100%); }
        .layout { display: block; width: 100%; clear: both; }

        .texto p { 
            line-height: 1.8; text-align: justify; font-size: 1.2rem; margin-bottom: 10px;
            display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden;
        }
        .texto p.expanded { -webkit-line-clamp: unset; display: block; }

        .read-more-btn { 
            background: #eee; border: none; color: var(--azul-mar); padding: 8px 20px; 
            border-radius: 20px; font-weight: bold; margin-bottom: 15px; cursor: pointer; display: block;
        }

        .foto { width: 450px; height: 350px; border-radius: 20px; background-size: cover; background-position: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); background-color: var(--celeste); border: 8px solid white; margin-bottom: 30px; }
        .foto.izq { float: left; margin-right: 40px; }
        .foto.der { float: right; margin-left: 40px; }

        /* GRÁFICO ECONOMÍA */
        .contenedor-grafico { width: 100%; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 40px; border: 2px solid var(--celeste); text-align: center; }
        .img-grafico { max-width: 100%; height: auto; border-radius: 10px; }

        .btn-video { display: inline-flex; align-items: center; background-color: var(--rojo-yt); color: white !important; text-decoration: none; padding: 12px 25px; border-radius: 50px; font-weight: 900; font-size: 0.9rem; margin-top: 10px; transition: 0.3s; text-transform: uppercase; }
        .btn-video::before { content: '▶'; margin-right: 10px; }

        .trivia-container { background: white; padding: 40px; border-radius: 20px; border: 2px solid #eee; }
        .btn-trivia { background: #f8f9fa; border: 2px solid #eee; padding: 15px 25px; border-radius: 12px; cursor: pointer; font-weight: 700; margin-right: 10px; margin-bottom: 10px; }
        .btn-trivia.correcta { background: var(--verde-exito) !important; color: white !important; }
        .btn-trivia.incorrecta { background: var(--rojo-error) !important; color: white !important; }
        .feedback { display: none; margin-top: 15px; font-weight: 700; }

        footer { background: var(--azul-mar); color: white; padding: 80px 20px; text-align: center; clear: both; }
    </style>
</head>
